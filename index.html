<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Uploader</title>
</head>
<body>

  <h1>Axo's Model Uploader</h1>

  <label>Open Cloud API Key<br>
    <input type="password" id="apiKey" placeholder="Your API key">
  </label><br><br>

  <label>Creator Type<br>
    <select id="creatorType">
      <option value="User">User</option>
      <option value="Group">Group</option>
    </select>
  </label><br><br>

  <label>Creator ID<br>
    <input type="number" id="creatorId" placeholder="Your user ID or group ID">
  </label><br><br>

  <label>Asset Name<br>
    <input type="text" id="assetName" placeholder="My Cool Model">
  </label><br><br>

  <label>Description (optional)<br>
    <textarea id="assetDescription" rows="3" placeholder="A short description..."></textarea>
  </label><br><br>

  <label>Model File (.rbxm or .rbxmx)<br>
    <input type="file" id="modelFile" accept=".rbxm,.rbxmx">
  </label><br><br>

  <button onclick="uploadModel()">Upload</button>

  <p id="status"></p>

  <script>
    const WORKER_URL = 'https://sl-model-uploader.acc943132.workers.dev/';

    async function uploadModel() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const creatorType = document.getElementById('creatorType').value;
      const creatorId = document.getElementById('creatorId').value.trim();
      const assetName = document.getElementById('assetName').value.trim();
      const assetDescription = document.getElementById('assetDescription').value.trim();
      const fileInput = document.getElementById('modelFile');
      const status = document.getElementById('status');

      if (!apiKey || !creatorId || !assetName || !fileInput.files[0]) {
        status.textContent = 'Please fill in all required fields and select a file.';
        return;
      }

      const file = fileInput.files[0];
      status.textContent = 'Uploading...';

      const formData = new FormData();

      const requestPayload = {
        assetType: 'Model',
        displayName: assetName,
        description: assetDescription,
        creationContext: {
          creator: {
            ...(creatorType === 'User'
              ? { userId: creatorId }
              : { groupId: creatorId })
          }
        }
      };

      formData.append('request', JSON.stringify(requestPayload));
      formData.append('fileContent', file, file.name);

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'x-api-key': apiKey },
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          status.textContent = 'Upload failed: ' + JSON.stringify(data);
        } else {
          status.textContent = 'Upload started! Operation: ' + data.path + ' check your Toolbox under "Models" or "Meshes" in a moment.';
        }
      } catch (err) {
        status.textContent = 'Request failed: ' + err.message;
      }
    }
  </script>

</body>
</html>
